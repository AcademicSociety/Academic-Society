<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قريباً - Academic Society</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #020617; /* نفس لون موقعك الأساسي */
            color: white;
            font-family: 'Cairo', sans-serif;
            text-align: center;
            overflow: hidden;
        }

        .container {
            padding: 20px;
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            max-width: 500px;
        }

        h1 {
            font-size: 2.5rem;
            color: #3b82f6; /* لون الـ Accent بتاعك */
            margin-bottom: 10px;
        }

        p {
            font-size: 1.2rem;
            color: #cbd5e1;
            line-height: 1.6;
        }

        .back-btn {
            display: inline-block;
            margin-top: 25px;
            padding: 10px 25px;
            background: #3b82f6;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: #2563eb;
            transform: scale(1.05);
        }

        /* أنيميشن خفيف */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="loader"></div>
        <h1>قريباً جداً!</h1>
        <p>إحنا دلوقتي شغالين على تجهيز محتوى أسطوري ليكم على المنصة دي.</p>
        <p>استنوا قناة اليوتيوب وحساب الانستجرام الخاص بالسيرفر، هيكون فيهم مفاجآت كتير.</p>
        <a href="index.html" class="back-btn">الرجوع للموقع</a>
    </div>

</body>
</html>
