<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pomodoro Elite - Ultra Custom</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&family=Cairo:wght@400;700&family=Roboto:wght@400;700&family=Montserrat:wght@400;700&family=Open+Sans:wght@400;700&family=Oswald:wght@400;700&family=Lato:wght@400;700&family=Raleway:wght@400;700&family=Ubuntu:wght@400;700&family=Playfair+Display:wght@400;700&family=Rubik:wght@400;700&family=Lora:wght@400;700&family=Nunito:wght@400;700&family=Outfit:wght@400;700&family=Lexend:wght@400;700&family=Tajawal:wght@400;700&family=Amiri:wght@400;700&family=Almarai:wght@400;700&family=El+Messiri:wght@400;700&family=Changa:wght@400;700&family=Kanit:wght@400;700&family=Quicksand:wght@400;700&family=Josefin+Sans:wght@400;700&family=Anton&family=Space+Grotesk:wght@400;700&family=Syne:wght@400;700&family=Work+Sans:wght@400;700&family=Fira+Sans:wght@400;700&family=Barlow:wght@400;700&family=Titillium+Web:wght@400;700&family=Mukta:wght@400;700&family=Heebo:wght@400;700&family=Inconsolata:wght@400;700&family=Bebas+Neue&family=Abril+Fatface&family=Pacifico&family=Righteous&family=Lobster&family=Comfortaa:wght@400;700&family=Varela+Round&family=Dancing+Script:wght@700&family=Caveat:wght@700&family=Satisfy&family=Zilla+Slab:wght@400;700&family=Exo+2:wght@400;700&family=Signika:wght@400;700&family=Kalam:wght@700&family=Permanent+Marker&family=Khand:wght@400;700&family=Rajdhani:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-accent: #3b82f6; 
            --bg-site: #020617;
            --card-bg: rgba(15, 23, 42, 0.8);
            --text-main: #ffffff;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Poppins', 'Cairo', sans-serif;
            background-color: var(--bg-site);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
            transition: 0.3s;
        }

        /* Top Navigation */
        .top-nav {
            position: absolute;
            top: 20px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 100;
        }

        .nav-item {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            padding: 8px 15px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-decoration: none;
            font-size: 14px;
            backdrop-filter: blur(5px);
        }

        /* Main Glass Card */
        .card-container {
            background: var(--card-bg);
            padding: 30px 20px;
            border-radius: 30px;
            width: 100%;
            max-width: 400px;
            backdrop-filter: blur(20px);
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
        }

        h2 { font-size: 24px; margin-bottom: 5px; color: var(--text-main); }
        .desc { font-size: 13px; color: var(--text-dim); margin-bottom: 20px; }

        /* Timer Modes Grid */
        .pomo-modes { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 10px; 
            margin-bottom: 25px; 
        }

        .mode-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-dim);
            padding: 12px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            font-family: inherit;
        }

        .mode-btn.active {
            background: var(--primary-accent);
            color: white;
            box-shadow: 0 0 15px var(--primary-accent);
            border-color: transparent;
        }

        /* Timer Numbers */
        .timer-display {
            font-size: 5.5rem;
            font-weight: 800;
            margin: 10px 0;
            color: var(--text-main);
            text-shadow: 0 0 20px var(--primary-accent);
            font-variant-numeric: tabular-nums;
        }

        .session-tracker {
            font-size: 13px;
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            color: var(--text-dim);
        }

        /* Controls */
        .pomo-controls { display: grid; grid-template-columns: 3fr 1fr; gap: 10px; }

        .btn-main {
            padding: 15px;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            font-family: inherit;
        }

        .start-btn { background: white; color: black; }
        .reset-btn { background: rgba(255,255,255,0.1); color: white; }

        /* Advanced Customizer Panel */
        .customizer {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .tool-box {
            background: rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 15px;
            text-align: left;
        }

        .tool-label { font-size: 10px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px; display: block; }

        /* Custom Font Dropdown */
        .font-select-container {
            position: relative;
            width: 100%;
        }

        select#fontSelector {
            width: 100%;
            background: #1e293b; /* Dark background so text is always visible */
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 8px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            outline: none;
        }

        /* Style the options to ensure they are visible */
        select#fontSelector option {
            background: #1e293b;
            color: white;
            padding: 10px;
        }

        /* Color Controls */
        .color-grid { display: flex; gap: 5px; flex-wrap: wrap; }
        .color-item {
            width: 25px; height: 25px; border-radius: 50%; border: 1px solid white;
            position: relative; overflow: hidden; cursor: pointer;
        }
        .color-item input { position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; cursor: pointer; }

        @media (max-width: 380px) {
            .timer-display { font-size: 4.5rem; }
            .card-container { padding: 20px 15px; }
        }
    </style>
</head>
<body>

    <audio id="alarmSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <div class="top-nav">
        <a href="#" class="nav-item"><i class="fa-solid fa-house"></i> Home</a>
        <button class="nav-item" onclick="toggleLanguage()"><i class="fa-solid fa-globe"></i> <span id="langTxt">عربي</span></button>
    </div>

    <div class="card-container" id="mainCard">
        <h2 id="title">Focus Session</h2>
        <p class="desc">Take control of your time.</p>

        <div class="pomo-modes">
            <button class="mode-btn active" id="m-work" onclick="setMode('work', 25)">Work</button>
            <button class="mode-btn" id="m-short" onclick="setMode('short', 5)">Short</button>
            <button class="mode-btn" id="m-long" onclick="setMode('long', 15)">Long</button>
            <button class="mode-btn" id="m-custom" onclick="promptCustomTime()">Custom</button>
        </div>

        <div class="timer-display" id="timer">25:00</div>
        
        <div class="session-tracker">
            <i class="fa-solid fa-fire" style="color:#fb923c"></i>
            <span>Sessions:</span> <strong id="sessionCount">0</strong>
        </div>

        <div class="pomo-controls">
            <button class="btn-main start-btn" onclick="toggleTimer()" id="mainAction">
                <i class="fa-solid fa-play"></i> <span>Start</span>
            </button>
            <button class="btn-main reset-btn" onclick="resetTimer()">
                <i class="fa-solid fa-rotate-right"></i>
            </button>
        </div>

        <div class="customizer">
            <div class="tool-box" style="grid-column: span 2;">
                <span class="tool-label">Full Theme Colors</span>
                <div class="color-grid">
                    <div class="color-item" title="Accent Color">
                        <input type="color" value="#3b82f6" oninput="updateColor('--primary-accent', this.value)">
                    </div>
                    <div class="color-item" title="Background Color" style="border-color: #ff0000;">
                        <input type="color" value="#020617" oninput="updateColor('--bg-site', this.value)">
                    </div>
                    <div class="color-item" title="Card Color">
                        <input type="color" value="#0f172a" oninput="updateCardColor(this.value)">
                    </div>
                    <div class="color-item" title="Text Color">
                        <input type="color" value="#ffffff" oninput="updateColor('--text-main', this.value)">
                    </div>
                </div>
            </div>

            <div class="tool-box" style="grid-column: span 2;">
                <span class="tool-label">Font Style (50 Options)</span>
                <div class="font-select-container">
                    <select id="fontSelector" onchange="updateFont(this.value)">
                        <option value="'Poppins'">Poppins (Modern)</option>
                        <option value="'Cairo'">Cairo (Professional Arabic)</option>
                        <option value="'Outfit'">Outfit (Sleek)</option>
                        <option value="'Montserrat'">Montserrat</option>
                        <option value="'Tajawal'">Tajawal (Arabic)</option>
                        <option value="'Lexend'">Lexend</option>
                        <option value="'Bebas Neue'">Bebas Neue (Bold)</option>
                        <option value="'Righteous'">Righteous</option>
                        <option value="'Pacifico'">Pacifico (Script)</option>
                        <option value="'Almarai'">Almarai (Arabic)</option>
                        <option value="'Space Grotesk'">Space Grotesk</option>
                        <option value="'Playfair Display'">Playfair Display</option>
                        <option value="'Amiri'">Amiri (Classic Arabic)</option>
                        <option value="'Inconsolata'">Inconsolata (Mono)</option>
                        <option value="'Lobster'">Lobster</option>
                        <option value="'Abril Fatface'">Abril Fatface</option>
                        <option value="'Changa'">Changa (Arabic Bold)</option>
                        <option value="'Quicksand'">Quicksand (Soft)</option>
                        <option value="'Syne'">Syne (Unique)</option>
                        <option value="'Permanent Marker'">Marker Style</option>
                        </select>
                </div>
            </div>
        </div>
    </div>

    <script>
        let totalTime = 25 * 60;
        let timeLeft = totalTime;
        let timerId = null;
        let isRunning = false;
        let sessions = 0;
        let currentLang = 'en';

        // Translation logic
        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'ar' : 'en';
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.getElementById('langTxt').innerText = currentLang === 'en' ? 'عربي' : 'English';
            document.getElementById('title').innerText = currentLang === 'ar' ? 'جلسة تركيز' : 'Focus Session';
            document.getElementById('mainAction').querySelector('span').innerText = isRunning ? (currentLang === 'ar' ? 'إيقاف' : 'Pause') : (currentLang === 'ar' ? 'ابدأ' : 'Start');
        }

        // Color & Theme Updates
        function updateColor(prop, val) {
            document.documentElement.style.setProperty(prop, val);
        }

        function updateCardColor(val) {
            // Converts hex to rgba for the transparency effect
            document.documentElement.style.setProperty('--card-bg', val + 'CC'); 
        }

        function updateFont(font) {
            document.body.style.fontFamily = font + ", sans-serif";
            // Update the selector itself to show preview
            document.getElementById('fontSelector').style.fontFamily = font;
        }

        // Timer Logic
        function setMode(type, mins) {
            clearInterval(timerId);
            isRunning = false;
            totalTime = mins * 60;
            timeLeft = totalTime;
            updateDisplay();
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`m-${type}`).classList.add('active');
            updateStartButtonState();
        }

        function promptCustomTime() {
            const val = prompt(currentLang === 'ar' ? "أدخل الدقائق:" : "Enter minutes:", "45");
            if (val && !isNaN(val)) setMode('custom', parseInt(val));
        }

        function updateDisplay() {
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            document.getElementById('timer').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }

        function toggleTimer() {
            if (isRunning) {
                clearInterval(timerId);
            } else {
                timerId = setInterval(() => {
                    timeLeft--;
                    updateDisplay();
                    if (timeLeft <= 0) {
                        clearInterval(timerId);
                        document.getElementById('alarmSound').play();
                        sessions++;
                        document.getElementById('sessionCount').innerText = sessions;
                        alert(currentLang === 'ar' ? "انتهى الوقت!" : "Time is up!");
                        resetTimer();
                    }
                }, 1000);
            }
            isRunning = !isRunning;
            updateStartButtonState();
        }

        function updateStartButtonState() {
            const btn = document.getElementById('mainAction');
            const span = btn.querySelector('span');
            const icon = btn.querySelector('i');
            if (isRunning) {
                span.innerText = currentLang === 'ar' ? 'إيقاف' : 'Pause';
                icon.className = 'fa-solid fa-pause';
            } else {
                span.innerText = currentLang === 'ar' ? 'ابدأ' : 'Start';
                icon.className = 'fa-solid fa-play';
            }
        }

        function resetTimer() {
            clearInterval(timerId);
            isRunning = false;
            timeLeft = totalTime;
            updateDisplay();
            updateStartButtonState();
        }

        // Initialize display
        updateDisplay();
    </script>
</body>
</html>
